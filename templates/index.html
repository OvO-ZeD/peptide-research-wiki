<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#010102">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Peptide Research Wiki">
  <title>Peptide Research Wiki</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body class="theme-dark">
  <canvas id="particles"></canvas>

  <div class="page">
    <header class="hero">
      <div class="hero-brand">
        <span class="brand-spike">+</span>
        <div class="hero-copy">
          <span class="hero-badge">Research Database</span>
          <h1>Peptide Research Wiki</h1>
        </div>
      </div>
      <p class="hero-desc">Search a peptide and get public research, trial details, plain-language summaries, methods, and source links.</p>
      <button id="theme_toggle" class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
        <span class="icon-moon">&#9790;</span>
        <span class="icon-sun">&#9728;</span>
      </button>
    </header>

    <section class="search-section">
      <div class="search-row">
        <div class="search-field">
          <label for="term_input">Peptide</label>
          <input id="term_input" type="text" placeholder="e.g., retatrutide, semaglutide, bpc-157" autofocus>
        </div>
        <div class="search-field">
          <label for="compare_input">Compare (optional)</label>
          <input id="compare_input" type="text" placeholder="e.g., tesa">
        </div>
        <button id="search_button" class="search-btn" onclick="searchPeptide()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
          Search
        </button>
      </div>
      <div id="status_message" class="status-message">Enter a peptide name and press Search.</div>
    </section>

    <main id="results" class="results"></main>
  </div>

  <div id="tilt-elements" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
