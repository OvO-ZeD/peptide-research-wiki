<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1224">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Peptide Research Wiki">
  <title>Peptide Research Wiki</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body class="theme-dark">
  <div class="page">
    <header class="hero panel">
      <div class="hero-copy">
        <span class="hero-badge">Research</span>
        <h1>Peptide Research Wiki</h1>
        <p>Search a peptide and get public research, trial details, plain-language summaries, methods, and source links.</p>
      </div>
      <button id="theme_toggle" class="hero-button" onclick="toggleTheme()">Toggle Dark Mode</button>
    </header>

    <section class="search-panel panel">
      <div class="search-header">
        <div>
          <label for="term_input">Search Peptide</label>
          <input id="term_input" type="text" placeholder="e.g., retatrutide, semaglutide, bpc-157">
        </div>
        <button id="search_button" onclick="searchPeptide()">Search</button>
      </div>
      <div class="search-extra">
        <label for="compare_input">Compare with (optional)</label>
        <input id="compare_input" type="text" placeholder="e.g., tesa">
      </div>
      <div id="status_message" class="status-message">Enter a peptide name and press Search.</div>
    </section>

    <main id="results" class="results"></main>
  </div>

  <script src="script.js"></script>
</body>
</html>
