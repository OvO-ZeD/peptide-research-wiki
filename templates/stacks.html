<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#010102">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Peptide Stacks">
  <title>Stack Recommendations — Peptide Research Wiki</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-512.svg">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v={{ cache_bust }}">
  <style>
    /* ─── Stack Page — Premium Luxury ─── */

    .stack-page { max-width: 840px; margin: 0 auto; }

    /* ─── Goal picker ─── */
    .goal-picker { margin-bottom: 20px; }

    .goal-picker label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-tertiary);
    }

    .goal-select {
      width: 100%;
      height: 54px;
      padding: 0 20px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--hairline);
      background: var(--surface-1);
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 500;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: border-color 0.25s, box-shadow 0.25s;
      outline: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='14' height='9' viewBox='0 0 14 9' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L7 7.5L13 1.5' stroke='%23888898' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 20px center;
      padding-right: 50px;
    }

    .goal-select:hover { border-color: var(--hairline-strong); }

    .goal-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow-soft), 0 0 24px rgba(217, 56, 56, 0.06);
    }

    .goal-select option {
      background: var(--surface-2);
      color: var(--ink);
      padding: 8px;
    }

    .accent-gold { color: #c9a96e; }

    /* ─── Results grid ─── */
    .stack-results { display: grid; gap: 14px; }

    /* ─── Stack card ─── */
    .stack-card {
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
      animation: fadeSlide 0.5s ease-out both;
    }

    .stack-card:nth-child(1) { animation-delay: 0s; }
    .stack-card:nth-child(2) { animation-delay: 0.05s; }
    .stack-card:nth-child(3) { animation-delay: 0.1s; }
    .stack-card:nth-child(4) { animation-delay: 0.15s; }

    .stack-card:hover {
      border-color: rgba(217, 56, 56, 0.2);
      box-shadow: 0 2px 24px rgba(0,0,0,0.2);
    }

    /* ─── Trigger bar ─── */
    .stack-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 16px 20px;
      background: transparent;
      border: none;
      color: var(--ink);
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: background 0.2s;
      text-align: left;
      gap: 12px;
    }

    .stack-trigger:hover { background: var(--surface-2); }

    .stack-trigger-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .stack-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
      color: var(--ink);
      white-space: nowrap;
    }

    .stack-badges { display: flex; gap: 4px; flex-wrap: wrap; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.3;
    }

    .badge-score { background: var(--primary-soft); color: var(--primary); }

    .badge-tier-a { background: rgba(39,166,68,0.12); color: #4cd964; }
    .badge-tier-b { background: rgba(90,200,250,0.12); color: #5ac8fa; }
    .badge-tier-c { background: rgba(245,166,35,0.12); color: #f5a623; }
    .badge-tier-d { background: rgba(229,72,77,0.12); color: #e5484d; }

    .stack-chevron {
      flex-shrink: 0;
      width: 18px; height: 18px;
      color: var(--ink-tertiary);
      transition: transform 0.3s ease;
    }

    .stack-card.open .stack-chevron { transform: rotate(180deg); }

    /* ─── Save button ─── */
    .save-btn {
      flex-shrink: 0;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      color: var(--ink-tertiary);
      transition: color 0.2s, transform 0.2s;
      padding: 2px;
    }

    .save-btn:hover { color: #f0b34b; transform: scale(1.15); }
    .save-btn.saved { color: #f0b34b; }

    /* ─── Saved stacks section ─── */
    .saved-section {
      margin-bottom: 20px;
    }

    .saved-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 4px;
    }

    .saved-title {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #f0b34b;
    }

    .saved-count {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--ink-tertiary);
      background: var(--surface-2);
      padding: 1px 7px;
      border-radius: var(--radius-pill);
    }

    .results-header {
      padding: 10px 4px;
    }

    .results-title {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink-muted);
    }

    /* ─── Body ─── */
    .stack-body { display: none; border-top: 1px solid var(--hairline); }
    .stack-card.open .stack-body { display: block; }

    .stack-body-inner {
      padding: 20px 22px 22px;
      display: grid;
      gap: 12px;
    }

    /* ─── Section block ─── */
    .section-block {
      padding: 14px 16px;
      border-radius: 6px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
    }

    .section-block h4 {
      margin: 0 0 6px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--primary);
    }

    .section-block p, .section-block li {
      margin: 0;
      font-size: 0.82rem;
      color: var(--ink-muted);
      line-height: 1.55;
    }

    .section-block ul { margin: 4px 0 0; padding: 0; list-style: none; }
    .section-block ul li { padding: 2px 0; }
    .section-block ul li::before {
      content: '\2022';
      color: var(--ink-tertiary);
      margin-right: 6px;
    }

    /* ─── Mechanism items ─── */
    .mech-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid var(--hairline);
    }

    .mech-item:last-child { border-bottom: none; }

    .mech-name {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--ink);
      flex-shrink: 0;
    }

    .mech-desc {
      font-size: 0.8rem;
      color: var(--ink-muted);
      line-height: 1.45;
    }

    /* ─── Protocol phases ─── */
    .protocol-phase {
      padding: 12px 14px 12px 16px;
      margin-bottom: 8px;
      border-radius: 6px;
      background: var(--surface-3);
      border-left: 3px solid var(--primary);
    }

    .protocol-phase:last-child { margin-bottom: 0; }

    .phase-head {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }

    .phase-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--primary);
    }

    .phase-weeks { font-size: 0.72rem; color: var(--ink-tertiary); }

    .phase-desc {
      font-size: 0.8rem;
      color: var(--ink-muted);
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .phase-meta {
      font-size: 0.76rem;
      color: var(--ink-subtle);
      line-height: 1.45;
    }

    .phase-meta strong { color: var(--ink-muted); font-weight: 600; }

    /* ─── Post-cycle ─── */
    .post-cycle-block {
      padding: 12px 14px 12px 16px;
      margin-top: 8px;
      border-radius: 6px;
      background: rgba(245,166,35,0.06);
      border: 1px solid rgba(245,166,35,0.12);
    }

    .post-cycle-block .phase-label { color: var(--warning); }
    .post-cycle-block .phase-desc { color: var(--ink-subtle); }

    /* ─── Cycle meta ─── */
    .cycle-meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding: 10px 14px;
      border-radius: 6px;
      background: var(--surface-3);
      border: 1px solid var(--hairline);
      font-size: 0.76rem;
      color: var(--ink-subtle);
    }

    .cycle-meta strong { color: var(--ink-muted); font-weight: 600; }

    /* ─── Evidence note ─── */
    .evidence-note {
      padding: 12px 14px;
      border-radius: 6px;
      background: rgba(245,166,35,0.04);
      border: 1px solid rgba(245,166,35,0.08);
    }

    .evidence-note .phase-desc { font-size: 0.78rem; }

    /* ─── Source chips ─── */
    .sources-mini {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 4px;
    }

    .source-chip {
      display: block;
      padding: 7px 11px;
      border-radius: 5px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      color: var(--ink-subtle);
      font-size: 0.72rem;
      font-weight: 500;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .source-chip:hover {
      border-color: var(--primary);
      color: var(--primary-hover);
      background: rgba(217, 56, 56, 0.05);
    }

    /* ─── Empty state ─── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--ink-tertiary); }
    .empty-state p { margin: 4px 0; font-size: 0.88rem; }

    /* ─── Results header ─── */
    .results-header {
      padding: 6px 4px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .results-header::before {
      content: '';
      width: 3px;
      height: 16px;
      background: var(--primary);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .results-title {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    /* ─── Goal section ─── */
    .goal-section {
      position: relative;
    }

    .goal-section::after {
      content: '';
      display: block;
      height: 1px;
      background: var(--hairline);
      margin: 4px 22px 0;
    }

    /* ─── Disclaimer ─── */
    .disclaimer {
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      background: rgba(245,166,35,0.05);
      border: 1px solid rgba(245,166,35,0.12);
      font-size: 0.74rem;
      color: var(--warning);
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }

    /* ─── Tier legend ─── */
    .tier-legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 14px;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      background: var(--surface-1);
      border: 1px solid var(--hairline);
    }

    .tier-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      color: var(--ink-tertiary);
      letter-spacing: 0.02em;
    }

    .tier-dot { width: 6px; height: 6px; border-radius: 50%; }
    .tier-dot.a { background: #4cd964; }
    .tier-dot.b { background: #5ac8fa; }
    .tier-dot.c { background: #f5a623; }
    .tier-dot.d { background: #e5484d; }

    .loading-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 0;
    }

    @media (max-width: 820px) {
      .stack-trigger { padding: 14px 16px; }
      .stack-body-inner { padding: 16px 16px 18px; }
      .goal-section { padding: 14px 14px !important; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="page stack-page">
    <nav class="nav-bar">
      <a href="/" class="nav-btn">Search</a>
      <a href="/stacks" class="nav-btn active">Stacks</a>
      <a href="/tracker" class="nav-btn">Tracker</a>
    </nav>

    <div class="disclaimer">Educational research context only. Not medical advice. Always consult a qualified healthcare provider.</div>

    <section class="goal-section" style="padding:20px 22px 18px">
      <h2 style="margin:0 0 2px;font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;letter-spacing:-0.03em;color:var(--ink)">Stack Recommendations</h2>
      <p style="margin:0 0 16px;font-size:0.82rem;color:var(--ink-subtle);font-weight:400;letter-spacing:0.01em">Select your goal to see evidence-backed peptide protocols.</p>
      <div class="goal-picker">
        <label for="goal_select">Goal</label>
        <select id="goal_select" class="goal-select">
          {% for key, label in goals.items() %}
          <option value="{{ key }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </section>

    <div id="stack_results" style="margin-top:6px"></div>

    <div class="tier-legend">
      <span class="tier-legend-item"><span class="tier-dot a"></span> A — Trial-heavy</span>
      <span class="tier-legend-item"><span class="tier-dot b"></span> B — Observational</span>
      <span class="tier-legend-item"><span class="tier-dot c"></span> C — Mechanistic</span>
      <span class="tier-legend-item"><span class="tier-dot d"></span> D — Anecdotal</span>
    </div>
  </div>

  <script src="stacks.js?v={{ cache_bust }}"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
