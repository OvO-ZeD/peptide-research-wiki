<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#010102">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Peptide Tracker">
  <title>Peptide Tracker — Peptide Research Wiki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v={{ cache_bust }}">
  <style>
    .tracker-page { max-width: 800px; margin: 0 auto; }

    .tracker-h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 2px;
    }

    /* ─── Empty state ─── */
    .empty-tracker {
      text-align: center;
      padding: 48px 20px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
    }

    .empty-tracker p { color: var(--ink-subtle); font-size: 0.85rem; margin: 6px 0; }

    .big-add-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--primary);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }

    .big-add-btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 20px var(--primary-glow-soft);
    }

    /* ─── Inline add form ─── */
    .inline-add {
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 14px;
      animation: slideUp 0.25s ease;
    }

    .inline-add h3 {
      margin: 0 0 10px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .inline-add .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: end;
    }

    .inline-add .field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .inline-add .field label {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-tertiary);
    }

    .inline-add .field input {
      height: 38px;
      padding: 0 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--hairline);
      background: var(--surface-2);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .inline-add .field input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-glow-soft); }

    /* ─── Tabs ─── */
    .tab-bar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      padding: 4px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-xl);
      min-height: 42px;
      align-items: center;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border: none;
      border-radius: var(--radius-lg);
      background: transparent;
      color: var(--ink-subtle);
      font-family: 'Inter', sans-serif;
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .tab-btn:hover { color: var(--ink); background: var(--surface-2); }

    .tab-btn.active {
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 600;
    }

    .tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .tab-add {
      margin-left: auto;
      padding: 6px 10px;
      border: none;
      border-radius: var(--radius-lg);
      background: transparent;
      color: var(--ink-tertiary);
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.15s;
    }

    .tab-add:hover { color: var(--primary); }

    .tab-del {
      background: none;
      border: none;
      color: transparent;
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0 2px;
      transition: color 0.15s;
      line-height: 1;
    }

    .tab-btn:hover .tab-del { color: var(--ink-tertiary); }
    .tab-btn .tab-del:hover { color: var(--error) !important; }

    /* ─── Log bar ─── */
    .log-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .log-bar .pep-name {
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .log-bar .pep-name:hover { background: var(--surface-2); }

    .log-bar .sep { color: var(--ink-tertiary); font-size: 0.7rem; }

    .quick-btn {
      padding: 6px 12px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--ink-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-btn:hover { border-color: var(--primary); color: var(--primary); }

    .quick-btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .quick-btn.primary:hover { background: var(--primary-hover); }

    .log-bar .dose-input {
      width: 65px;
      height: 34px;
      padding: 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--hairline);
      background: var(--surface-2);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      text-align: center;
      outline: none;
    }

    .log-bar .dose-input:focus { border-color: var(--primary); }

    .log-bar .bd-toggle {
      background: none;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
      color: var(--ink-tertiary);
      width: 32px; height: 32px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .log-bar .bd-toggle:hover { border-color: var(--primary); color: var(--primary); }

    .bd-row {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      margin: -8px 0 14px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-top: none;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      flex-wrap: wrap;
    }

    .bd-row input {
      height: 34px;
      padding: 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--hairline);
      background: var(--surface-2);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      outline: none;
    }

    .bd-row input:focus { border-color: var(--primary); }

    .bd-row input[type="date"] { width: 130px; }
    .bd-row input[type="time"] { width: 85px; }

    .log-bar .now-btn {
      background: none;
      border: none;
      color: var(--ink-tertiary);
      font-size: 0.72rem;
      cursor: pointer;
      padding: 4px;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-style: dotted;
    }

    .log-bar .now-btn:hover { color: var(--primary); }

    /* ─── Inline rename ─── */
    .rename-input {
      height: 28px;
      padding: 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--primary);
      background: var(--surface-2);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      outline: none;
      width: 150px;
    }

    /* ─── Insights ─── */
    .insights {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .insight-card {
      padding: 18px 14px 16px;
      border-radius: var(--radius-lg);
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeSlide 0.5s ease-out both;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .insight-card:nth-child(1) { animation-delay: 0s; }
    .insight-card:nth-child(2) { animation-delay: 0.05s; }
    .insight-card:nth-child(3) { animation-delay: 0.1s; }
    .insight-card:nth-child(4) { animation-delay: 0.15s; }

    .insight-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0.3;
    }

    .insight-card:hover {
      border-color: rgba(217,56,56,0.15);
      box-shadow: 0 6px 24px rgba(0,0,0,0.2), 0 0 30px rgba(217,56,56,0.03);
      transform: translateY(-2px);
    }

    .insight-card .val {
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    .insight-card .lbl {
      font-size: 0.58rem;
      color: var(--ink-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-top: 4px;
    }

    /* ─── Chart ─── */
    .chart-wrap {
      padding: 12px 14px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      margin-bottom: 14px;
    }

    .chart-wrap canvas { width: 100%; height: 100px; display: block; }

    /* ─── Logs list ─── */
    .logs-section {
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 14px;
    }

    .logs-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--hairline);
    }

    .logs-head h3 { margin: 0; font-size: 0.8rem; font-weight: 600; }

    .logs-head .week-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logs-head .week-nav button {
      background: none;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
      color: var(--ink-subtle);
      padding: 2px 8px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.15s;
    }

    .logs-head .week-nav button:hover { border-color: var(--primary); color: var(--primary); }

    .logs-head .week-nav span { font-size: 0.78rem; font-weight: 500; color: var(--ink-muted); min-width: 60px; text-align: center; }

    .logs-head .l-actions { display: flex; gap: 4px; }

    .logs-head .l-actions button {
      padding: 3px 8px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--ink-tertiary);
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .logs-head .l-actions button:hover { border-color: var(--primary); color: var(--primary); }

    .log-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--hairline);
      transition: background 0.1s;
    }

    .log-row:last-child { border-bottom: none; }
    .log-row:hover { background: var(--surface-2); }

    .log-row .l-left { display: flex; align-items: center; gap: 8px; }
    .log-row .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .log-row .date { font-size: 0.76rem; color: var(--ink-muted); }
    .log-row .time { font-size: 0.7rem; color: var(--ink-tertiary); }
    .log-row .dose { font-size: 0.8rem; font-weight: 600; color: var(--ink); }

    .log-row .del {
      background: none;
      border: none;
      color: var(--ink-tertiary);
      cursor: pointer;
      padding: 2px 6px;
      font-size: 0.8rem;
      transition: color 0.15s;
      opacity: 0;
    }

    .log-row:hover .del { opacity: 1; }
    .log-row .del:hover { color: var(--primary); }

    .empty-logs { padding: 24px 14px; text-align: center; color: var(--ink-tertiary); font-size: 0.8rem; }

    /* ─── Calculator ─── */
    .calc-card {
      padding: 24px 28px;
      background: linear-gradient(135deg, var(--surface-1) 0%, rgba(15,14,18,0.95) 100%);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-xl);
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
      animation: fadeSlide 0.6s ease-out;
      transition: border-color 0.3s, box-shadow 0.3s;
      transform-style: preserve-3d;
    }

    .calc-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, rgba(217,56,56,0.08) 0%, transparent 50%, rgba(217,56,56,0.03) 100%);
      pointer-events: none;
    }

    .calc-card:hover {
      border-color: rgba(217,56,56,0.15);
      box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 60px rgba(217,56,56,0.03);
    }

    .calc-card h3 {
      margin: 0 0 18px;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
      position: relative;
    }

    .calc-card h3::after {
      content: '';
      display: block;
      width: 32px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
      margin-top: 6px;
      opacity: 0.6;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      position: relative;
    }

    .calc-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 16px 18px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      animation: fadeSlide 0.5s ease-out both;
    }

    .calc-field:hover {
      border-color: rgba(217,56,56,0.2);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .calc-field:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow-soft), 0 4px 20px rgba(0,0,0,0.2);
    }

    .calc-field label {
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-tertiary);
    }

    .calc-field input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--surface-3);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: background 0.2s;
      box-sizing: border-box;
    }

    .calc-field input:focus { background: var(--surface-1); }

    .calc-result-row {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px 24px;
      background: rgba(217,56,56,0.04);
      border: 1px solid rgba(217,56,56,0.1);
      border-radius: var(--radius-md);
      animation: pulseGlow 3s ease-in-out infinite;
    }

    .calc-result-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-tertiary);
    }

    .calc-result {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.03em;
      font-family: 'Inter', sans-serif;
    }

    .calc-result-unit {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink-muted);
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(217,56,56,0.03); }
      50% { box-shadow: 0 0 20px rgba(217,56,56,0.08); }
    }

    @keyframes float3d {
      0%, 100% { transform: perspective(800px) rotateX(1deg) translateY(0); }
      50% { transform: perspective(800px) rotateX(-1deg) translateY(-2px); }
    }

    .calc-card {
      animation: fadeSlide 0.6s ease-out, float3d 6s ease-in-out infinite;
    }

    .calc-field {
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .calc-field:hover {
      transform: perspective(600px) translateZ(6px) scale(1.02);
      border-color: rgba(217,56,56,0.3);
      box-shadow: 0 8px 30px rgba(0,0,0,0.25), 0 0 40px rgba(217,56,56,0.04);
    }

    .calc-field input {
      transition: background 0.2s, transform 0.2s;
    }

    .calc-field:focus-within input {
      transform: scale(1.03);
    }

    @media (max-width: 640px) {
      .calc-card { padding: 18px 16px; }
      .calc-grid { grid-template-columns: 1fr; gap: 10px; }
    }

    @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    @media (max-width: 720px) {
      .insights { grid-template-columns: 1fr 1fr; gap: 10px; }
      .insight-card { padding: 16px 12px 14px; }
    }
    @media (max-width: 640px) {
      .log-bar { flex-direction: column; align-items: stretch; }
      .log-bar .dose-input { width: 100%; }
    }
    @media (max-width: 480px) {
      .tracker-page .page { padding-left: max(10px, env(safe-area-inset-left, 10px)); padding-right: max(10px, env(safe-area-inset-right, 10px)); }
      .tracker-h2 { font-size: 1.05rem; }
      .tab-bar { gap: 3px; padding: 3px; min-height: 38px; border-radius: var(--radius-lg); }
      .tab-btn { font-size: 0.72rem; padding: 5px 10px; }
      .tab-add { font-size: 0.9rem; padding: 4px 8px; }
      .log-bar { padding: 10px 12px; gap: 6px; }
      .log-bar .pep-name { font-size: 0.8rem; }
      .quick-btn { font-size: 0.72rem; padding: 5px 10px; min-height: 36px; }
      .bd-row { padding: 8px 12px; gap: 6px; }
      .bd-row input[type="date"] { width: 120px; font-size: 16px; }
      .bd-row input[type="time"] { width: 80px; font-size: 16px; }
      .insights { grid-template-columns: 1fr 1fr; gap: 8px; }
      .insight-card { padding: 14px 10px 12px; }
      .insight-card .val { font-size: 0.85rem; }
      .insight-card .lbl { font-size: 0.52rem; }
      .calc-card { padding: 14px 12px; }
      .calc-card h3 { font-size: 0.88rem; }
      .calc-grid { grid-template-columns: 1fr; gap: 8px; }
      .calc-field { padding: 12px 14px; }
      .calc-field input { height: 36px; font-size: 16px; }
      .calc-result-row { padding: 14px 16px; gap: 8px; }
      .calc-result { font-size: 1.3rem; }
      .calc-result-label { font-size: 0.68rem; }
      .logs-head { padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
      .logs-head h3 { font-size: 0.75rem; }
      .logs-head .week-nav span { font-size: 0.72rem; min-width: 50px; }
      .log-row { padding: 6px 12px; }
      .log-row .date { font-size: 0.72rem; }
      .log-row .dose { font-size: 0.76rem; }
      .empty-tracker { padding: 32px 16px; }
      .big-add-btn { padding: 10px 20px; font-size: 0.85rem; }
      .inline-add { padding: 14px 14px; }
      .inline-add .field input { font-size: 16px; }
      .rename-input { width: 120px; font-size: 0.8rem; }
      .context-menu { min-width: 120px; }
      .context-menu-item { font-size: 0.74rem; padding: 6px 12px; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="page tracker-page">
    <nav class="nav-bar">
      <span class="nav-brand">Peptide<span class="accent">DB</span></span>
      <span class="nav-links">
        <a href="/" class="nav-btn">Search</a>
        <a href="/stacks" class="nav-btn">Stacks</a>
        <a href="/tracker" class="nav-btn active">Tracker</a>
        <a href="/ask" class="nav-btn">Ask AI</a>
        <button class="theme-toggle" id="theme_btn" title="Toggle theme">☾</button>
      </span>
    </nav>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <a href="/" class="bottom-nav-btn">
          <div class="bn-icon-wrap">
            <svg viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="7"/><line x1="15.5" y1="15.5" x2="21" y2="21"/></svg>
          </div>
          <span class="bn-label">Search</span>
        </a>
        <a href="/stacks" class="bottom-nav-btn">
          <div class="bn-icon-wrap">
            <svg viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="10" rx="1.5"/><path d="M6 10 V8a2 2 0 0 1 2-2 h8a2 2 0 0 1 2 2 v2"/></svg>
          </div>
          <span class="bn-label">Stacks</span>

        <a href="/tracker" class="bottom-nav-btn active">

            <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="14" rx="2"/><line x1="8" y1="4" x2="8" y2="8"/><line x1="16" y1="4" x2="16" y2="8"/><polyline points="9,13 11.5,15.5 16,11" fill="none"/></svg>

          </div>

        <button class="bottom-nav-btn" onclick="var b=document.getElementById('theme_btn');if(b)b.click();">
          <div class="bn-icon-wrap">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><line x1="12" y1="2.5" x2="12" y2="4.5"/><line x1="12" y1="19.5" x2="12" y2="21.5"/><line x1="4" y1="12" x2="2.5" y2="12"/><line x1="21.5" y1="12" x2="20" y2="12"/><line x1="6.3" y1="6.3" x2="5.2" y2="5.2"/><line x1="18.8" y1="18.8" x2="17.7" y2="17.7"/><line x1="6.3" y1="17.7" x2="5.2" y2="18.8"/><line x1="18.8" y1="5.2" x2="17.7" y2="6.3"/></svg>

    <h2 class="tracker-h2">Peptide Tracker</h2>

    <!-- Tabs -->
    <div class="tab-bar" id="tab_bar"></div>

    <!-- Inline add form (hidden by default) -->
    <div id="add_form" style="display:none">
      <div class="inline-add">
        <h3>Add peptide</h3>
        <div class="row">
          <div class="field" style="flex:1;min-width:140px">
            <label>Name</label>
            <input id="add_name" placeholder="e.g. Tesamorelin" enterkeyhint="done">
          </div>
          <div class="field">
            <label>Dose (mg)</label>
            <input id="add_dose" type="number" step="0.01" min="0.01" placeholder="2" style="width:80px" enterkeyhint="done">
          </div>
          <div class="field">
            <label>x/week</label>
            <input id="add_freq" type="number" min="1" max="14" value="3" style="width:60px" enterkeyhint="done">
          </div>
          <button class="quick-btn primary" onclick="saveAddPeptide()">Add</button>
          <button class="quick-btn" onclick="closeAddForm()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Active panel -->
    <div id="active_panel"></div>

    <!-- Calculator (always visible) -->
    <div class="calc-card" id="calc_card">
      <h3>Dose Calculator</h3>
      <div class="calc-grid">
        <div class="calc-field">
          <label for="calc_vial">Vial (mg)</label>
          <input id="calc_vial" value="5" step="0.1" min="0.1" oninput="calcUnits()" enterkeyhint="done">
        </div>
        <div class="calc-field" style="animation-delay:0.05s">
          <label for="calc_water">Water (ml)</label>
          <input id="calc_water" value="1" step="0.1" min="0.1" oninput="calcUnits()" enterkeyhint="done">
        </div>
        <div class="calc-field" style="animation-delay:0.1s">
          <label for="calc_dose">Target dose (mg)</label>
          <input id="calc_dose" value="2" step="0.01" min="0.01" oninput="calcUnits()" enterkeyhint="done">
        </div>
        <div class="calc-result-row">
          <span class="calc-result-label">You need</span>
          <span class="calc-result" id="calc_result">40</span>
          <span class="calc-result-unit">units</span>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <div class="site-footer-links">
          <a href="https://clinicaltrials.gov" target="_blank" rel="noopener">ClinicalTrials.gov</a>
          <a href="https://pubmed.ncbi.nlm.nih.gov" target="_blank" rel="noopener">PubMed</a>
        </div>
        <div class="site-footer-meta">Educational research context only — not medical advice.</div>
      </div>
    </footer>
  </div>

  <div class="progress-bar" id="progress_bar"></div>
  <div class="toast-container" id="toast_container"></div>
  <div class="context-menu" id="context_menu">
    <div class="context-menu-item" onclick="contextEdit()">Edit dose</div>
    <div class="context-menu-item danger" onclick="contextDelete()">Delete</div>
  </div>
  <div class="install-banner" id="install_banner">
    <span>Install PeptideDB for offline access</span>
    <button class="install-btn" id="install_btn">Install</button>
    <button class="install-dismiss" id="install_dismiss">✕</button>
  </div>
  <script>
    // ─── Page transitions ───
    function navigateTo(url) {
      var page = document.querySelector('.page');
      if (page) page.classList.add('fade-out');
      setTimeout(function () { window.location.href = url; }, 180);
    }
    document.querySelectorAll('.nav-btn').forEach(function (el) {
      el.addEventListener('click', function (e) {
        if (el.getAttribute('href')) { e.preventDefault(); navigateTo(el.getAttribute('href')); }
      });
    });

    // ─── Toast ───
    function showToast(msg, icon) {
      var c = document.getElementById('toast_container');
      var t = document.createElement('div');
      t.className = 'toast';
      if (icon) t.innerHTML = '<span class="toast-icon">' + icon + '</span>' + msg;
      else t.textContent = msg;
      c.appendChild(t);
      setTimeout(function () { t.classList.add('toast-out'); setTimeout(function () { t.remove(); }, 300); }, 2200);
    }

    // ─── Keyboard shortcuts ───
    document.addEventListener('keydown', function (e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === '1') { navigateTo('/'); }
      if (e.key === '2') { navigateTo('/stacks'); }
      if (e.key === '3') { navigateTo('/tracker'); }
    });

    // ─── Theme toggle ───
    (function(){
      var btn = document.getElementById('theme_btn');
      if (!btn) return;
      var saved = localStorage.getItem('peptide_theme');
      if (saved === 'light') document.body.classList.add('light-theme');
      btn.textContent = document.body.classList.contains('light-theme') ? '☀' : '☾';
      btn.addEventListener('click', function () {
        document.body.classList.toggle('light-theme');
        var isLight = document.body.classList.contains('light-theme');
        localStorage.setItem('peptide_theme', isLight ? 'light' : 'dark');
        btn.textContent = isLight ? '☀' : '☾';
      });
    })();

    // ─── Progress bar ───
    (function(){
      var bar = document.getElementById('progress_bar');
      if (!bar) return;
      window.addEventListener('scroll', function () {
        var h = document.documentElement.scrollHeight - window.innerHeight;
        bar.style.width = (h > 0 ? (window.scrollY / h) * 100 : 0) + '%';
      });
    })();

    // ─── PWA Install ───
    (function(){
      var banner = document.getElementById('install_banner');
      if (!banner) return;
      var deferred = null;
      window.addEventListener('beforeinstallprompt', function (e) { e.preventDefault(); deferred = e; banner.classList.add('active'); });
      var btn = document.getElementById('install_btn');
      if (btn) btn.addEventListener('click', function () { if (!deferred) return; deferred.prompt(); deferred.userChoice.then(function () { deferred = null; banner.classList.remove('active'); }); });
      document.getElementById('install_dismiss').addEventListener('click', function () { banner.classList.remove('active'); });
    })();

    // ─── Swipe between pages ───
    (function () {
      var startX = 0, startY = 0;
      document.addEventListener('touchstart', function (e) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive: true });
      document.addEventListener('touchend', function (e) {
        var dx = e.changedTouches[0].clientX - startX;
        var dy = e.changedTouches[0].clientY - startY;
        if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.6) return;
        var pages = ['/', '/stacks', '/tracker'];
        var idx = pages.indexOf(window.location.pathname);
        if (idx < 0) return;
        if (dx < 0 && idx < pages.length - 1) { showToast('→ ' + (pages[idx + 1].replace('/', '') || 'Search').replace('stacks', 'Stacks').replace('tracker', 'Tracker')); setTimeout(function () { navigateTo(pages[idx + 1]); }, 200); }
        if (dx > 0 && idx > 0) { showToast('← ' + (pages[idx - 1].replace('/', '') || 'Home').replace('stacks', 'Stacks').replace('tracker', 'Tracker')); setTimeout(function () { navigateTo(pages[idx - 1]); }, 200); }
      }, { passive: true });
    })();

    // ─── Inline rename ───
    function startRename(id) {
      var p = state.peptides[id];
      if (!p) return;
      var el = document.getElementById("pep_name_display");
      el.innerHTML = '<input class="rename-input" id="rename_input" value="' + escHtml(p.name) + '" onblur="finishRename(\'' + id + '\')" onkeydown="if(event.key===\'Enter\')this.blur()" autofocus>';
      var inp = document.getElementById("rename_input");
      inp.focus();
      inp.select();
    }

    function finishRename(id) {
      var inp = document.getElementById("rename_input");
      if (inp) {
        var val = inp.value.trim();
        if (val) {
          state.peptides[id].name = val;
          saveState();
          renderTabs();
          renderActive();
        } else {
          renderActive();
        }
      }
    }
  </script>
  <script src="tracker.js?v={{ cache_bust }}"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
