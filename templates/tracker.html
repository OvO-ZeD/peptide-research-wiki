<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#010102">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Peptide Tracker">
  <title>Peptide Tracker — Peptide Research Wiki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v={{ cache_bust }}">
  <style>
    .tracker-page { max-width: 800px; margin: 0 auto; }

    .tracker-h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 2px;
    }

    /* ─── Empty state ─── */
    .empty-tracker {
      text-align: center;
      padding: 48px 20px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
    }

    .empty-tracker p { color: var(--ink-subtle); font-size: 0.85rem; margin: 6px 0; }

    .big-add-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--primary);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }

    .big-add-btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 20px var(--primary-glow-soft);
    }

    /* ─── Inline add form ─── */
    .inline-add {
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 14px;
      animation: slideUp 0.25s ease;
    }

    .inline-add h3 {
      margin: 0 0 10px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .inline-add .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: end;
    }

    .inline-add .field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .inline-add .field label {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-tertiary);
    }

    .inline-add .field input {
      height: 38px;
      padding: 0 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--hairline);
      background: var(--surface-2);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .inline-add .field input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-glow-soft); }

    /* ─── Tabs ─── */
    .tab-bar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      padding: 4px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-xl);
      min-height: 42px;
      align-items: center;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border: none;
      border-radius: var(--radius-lg);
      background: transparent;
      color: var(--ink-subtle);
      font-family: 'Inter', sans-serif;
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .tab-btn:hover { color: var(--ink); background: var(--surface-2); }

    .tab-btn.active {
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 600;
    }

    .tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .tab-add {
      margin-left: auto;
      padding: 6px 10px;
      border: none;
      border-radius: var(--radius-lg);
      background: transparent;
      color: var(--ink-tertiary);
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.15s;
    }

    .tab-add:hover { color: var(--primary); }

    .tab-del {
      background: none;
      border: none;
      color: transparent;
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0 2px;
      transition: color 0.15s;
      line-height: 1;
    }

    .tab-btn:hover .tab-del { color: var(--ink-tertiary); }
    .tab-btn .tab-del:hover { color: var(--error) !important; }

    /* ─── Log bar ─── */
    .log-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .log-bar .pep-name {
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .log-bar .pep-name:hover { background: var(--surface-2); }

    .log-bar .sep { color: var(--ink-tertiary); font-size: 0.7rem; }

    .quick-btn {
      padding: 6px 12px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--ink-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-btn:hover { border-color: var(--primary); color: var(--primary); }

    .quick-btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .quick-btn.primary:hover { background: var(--primary-hover); }

    .log-bar .dose-input {
      width: 65px;
      height: 34px;
      padding: 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--hairline);
      background: var(--surface-2);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      text-align: center;
      outline: none;
    }

    .log-bar .dose-input:focus { border-color: var(--primary); }

    .log-bar .bd-toggle {
      background: none;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
      color: var(--ink-tertiary);
      width: 32px; height: 32px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .log-bar .bd-toggle:hover { border-color: var(--primary); color: var(--primary); }

    .bd-row {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      margin: -8px 0 14px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-top: none;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      flex-wrap: wrap;
    }

    .bd-row input {
      height: 34px;
      padding: 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--hairline);
      background: var(--surface-2);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      outline: none;
    }

    .bd-row input:focus { border-color: var(--primary); }

    .bd-row input[type="date"] { width: 130px; }
    .bd-row input[type="time"] { width: 85px; }

    .log-bar .now-btn {
      background: none;
      border: none;
      color: var(--ink-tertiary);
      font-size: 0.72rem;
      cursor: pointer;
      padding: 4px;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-style: dotted;
    }

    .log-bar .now-btn:hover { color: var(--primary); }

    /* ─── Inline rename ─── */
    .rename-input {
      height: 28px;
      padding: 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--primary);
      background: var(--surface-2);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      outline: none;
      width: 150px;
    }

    /* ─── Insights ─── */
    .insights {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .insight-card {
      padding: 18px 14px 16px;
      border-radius: var(--radius-lg);
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeSlide 0.5s ease-out both;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .insight-card:nth-child(1) { animation-delay: 0s; }
    .insight-card:nth-child(2) { animation-delay: 0.05s; }
    .insight-card:nth-child(3) { animation-delay: 0.1s; }
    .insight-card:nth-child(4) { animation-delay: 0.15s; }

    .insight-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0.3;
    }

    .insight-card:hover {
      border-color: rgba(217,56,56,0.15);
      box-shadow: 0 6px 24px rgba(0,0,0,0.2), 0 0 30px rgba(217,56,56,0.03);
      transform: translateY(-2px);
    }

    .insight-card .val {
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    .insight-card .lbl {
      font-size: 0.58rem;
      color: var(--ink-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-top: 4px;
    }

    /* ─── Chart ─── */
    .chart-wrap {
      padding: 12px 14px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      margin-bottom: 14px;
    }

    .chart-wrap canvas { width: 100%; height: 100px; display: block; }

    /* ─── Logs list ─── */
    .logs-section {
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 14px;
    }

    .logs-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--hairline);
    }

    .logs-head h3 { margin: 0; font-size: 0.8rem; font-weight: 600; }

    .logs-head .week-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logs-head .week-nav button {
      background: none;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
      color: var(--ink-subtle);
      padding: 2px 8px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.15s;
    }

    .logs-head .week-nav button:hover { border-color: var(--primary); color: var(--primary); }

    .logs-head .week-nav span { font-size: 0.78rem; font-weight: 500; color: var(--ink-muted); min-width: 60px; text-align: center; }

    .logs-head .l-actions { display: flex; gap: 4px; }

    .logs-head .l-actions button {
      padding: 3px 8px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--ink-tertiary);
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .logs-head .l-actions button:hover { border-color: var(--primary); color: var(--primary); }

    .log-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--hairline);
      transition: background 0.1s;
    }

    .log-row:last-child { border-bottom: none; }
    .log-row:hover { background: var(--surface-2); }

    .log-row .l-left { display: flex; align-items: center; gap: 8px; }
    .log-row .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .log-row .date { font-size: 0.76rem; color: var(--ink-muted); }
    .log-row .time { font-size: 0.7rem; color: var(--ink-tertiary); }
    .log-row .dose { font-size: 0.8rem; font-weight: 600; color: var(--ink); }

    .log-row .del {
      background: none;
      border: none;
      color: var(--ink-tertiary);
      cursor: pointer;
      padding: 2px 6px;
      font-size: 0.8rem;
      transition: color 0.15s;
      opacity: 0;
    }

    .log-row:hover .del { opacity: 1; }
    .log-row .del:hover { color: var(--primary); }

    .empty-logs { padding: 24px 14px; text-align: center; color: var(--ink-tertiary); font-size: 0.8rem; }

    /* ─── Calculator ─── */
    .calc-card {
      padding: 24px 28px;
      background: linear-gradient(135deg, var(--surface-1) 0%, rgba(15,14,18,0.95) 100%);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-xl);
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
      animation: fadeSlide 0.6s ease-out;
      transition: border-color 0.3s, box-shadow 0.3s;
      transform-style: preserve-3d;
    }

    .calc-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, rgba(217,56,56,0.08) 0%, transparent 50%, rgba(217,56,56,0.03) 100%);
      pointer-events: none;
    }

    .calc-card:hover {
      border-color: rgba(217,56,56,0.15);
      box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 60px rgba(217,56,56,0.03);
    }

    .calc-card h3 {
      margin: 0 0 18px;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
      position: relative;
    }

    .calc-card h3::after {
      content: '';
      display: block;
      width: 32px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
      margin-top: 6px;
      opacity: 0.6;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      position: relative;
    }

    .calc-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 16px 18px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      animation: fadeSlide 0.5s ease-out both;
    }

    .calc-field:hover {
      border-color: rgba(217,56,56,0.2);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .calc-field:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow-soft), 0 4px 20px rgba(0,0,0,0.2);
    }

    .calc-field label {
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-tertiary);
    }

    .calc-field input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--surface-3);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: background 0.2s;
      box-sizing: border-box;
    }

    .calc-field input:focus { background: var(--surface-1); }

    .calc-result-row {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px 24px;
      background: rgba(217,56,56,0.04);
      border: 1px solid rgba(217,56,56,0.1);
      border-radius: var(--radius-md);
      animation: pulseGlow 3s ease-in-out infinite;
    }

    .calc-result-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-tertiary);
    }

    .calc-result {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.03em;
      font-family: 'Inter', sans-serif;
    }

    .calc-result-unit {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink-muted);
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(217,56,56,0.03); }
      50% { box-shadow: 0 0 20px rgba(217,56,56,0.08); }
    }

    @keyframes float3d {
      0%, 100% { transform: perspective(800px) rotateX(1deg) translateY(0); }
      50% { transform: perspective(800px) rotateX(-1deg) translateY(-2px); }
    }

    .calc-card {
      animation: fadeSlide 0.6s ease-out, float3d 6s ease-in-out infinite;
    }

    .calc-field {
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .calc-field:hover {
      transform: perspective(600px) translateZ(6px) scale(1.02);
      border-color: rgba(217,56,56,0.3);
      box-shadow: 0 8px 30px rgba(0,0,0,0.25), 0 0 40px rgba(217,56,56,0.04);
    }

    .calc-field input {
      transition: background 0.2s, transform 0.2s;
    }

    .calc-field:focus-within input {
      transform: scale(1.03);
    }

    @media (max-width: 640px) {
      .calc-card { padding: 18px 16px; }
      .calc-grid { grid-template-columns: 1fr; gap: 10px; }
    }

    @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    @media (max-width: 720px) {
      .insights { grid-template-columns: 1fr 1fr; gap: 10px; }
      .insight-card { padding: 16px 12px 14px; }
    }
    @media (max-width: 640px) {
      .log-bar { flex-direction: column; align-items: stretch; }
      .log-bar .dose-input { width: 100%; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="page tracker-page">
    <nav class="nav-bar">
      <span class="nav-brand">Peptide<span class="accent">DB</span></span>
      <span class="nav-links">
        <a href="/" class="nav-btn">Search</a>
        <a href="/stacks" class="nav-btn">Stacks</a>
        <a href="/tracker" class="nav-btn active">Tracker</a>
      </span>
    </nav>

    <h2 class="tracker-h2">Peptide Tracker</h2>

    <!-- Tabs -->
    <div class="tab-bar" id="tab_bar"></div>

    <!-- Inline add form (hidden by default) -->
    <div id="add_form" style="display:none">
      <div class="inline-add">
        <h3>Add peptide</h3>
        <div class="row">
          <div class="field" style="flex:1;min-width:140px">
            <label>Name</label>
            <input id="add_name" placeholder="e.g. Tesamorelin">
          </div>
          <div class="field">
            <label>Dose (mg)</label>
            <input id="add_dose" type="number" step="0.01" min="0.01" placeholder="2" style="width:80px">
          </div>
          <div class="field">
            <label>x/week</label>
            <input id="add_freq" type="number" min="1" max="14" value="3" style="width:60px">
          </div>
          <button class="quick-btn primary" onclick="saveAddPeptide()">Add</button>
          <button class="quick-btn" onclick="closeAddForm()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Active panel -->
    <div id="active_panel"></div>

    <!-- Calculator (always visible) -->
    <div class="calc-card" id="calc_card">
      <h3>Dose Calculator</h3>
      <div class="calc-grid">
        <div class="calc-field">
          <label for="calc_vial">Vial (mg)</label>
          <input id="calc_vial" value="5" step="0.1" min="0.1" oninput="calcUnits()">
        </div>
        <div class="calc-field" style="animation-delay:0.05s">
          <label for="calc_water">Water (ml)</label>
          <input id="calc_water" value="1" step="0.1" min="0.1" oninput="calcUnits()">
        </div>
        <div class="calc-field" style="animation-delay:0.1s">
          <label for="calc_dose">Target dose (mg)</label>
          <input id="calc_dose" value="2" step="0.01" min="0.01" oninput="calcUnits()">
        </div>
        <div class="calc-result-row">
          <span class="calc-result-label">You need</span>
          <span class="calc-result" id="calc_result">40</span>
          <span class="calc-result-unit">units</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── Inline rename ───
    function startRename(id) {
      var p = state.peptides[id];
      if (!p) return;
      var el = document.getElementById("pep_name_display");
      el.innerHTML = '<input class="rename-input" id="rename_input" value="' + escHtml(p.name) + '" onblur="finishRename(\'' + id + '\')" onkeydown="if(event.key===\'Enter\')this.blur()" autofocus>';
      var inp = document.getElementById("rename_input");
      inp.focus();
      inp.select();
    }

    function finishRename(id) {
      var inp = document.getElementById("rename_input");
      if (inp) {
        var val = inp.value.trim();
        if (val) {
          state.peptides[id].name = val;
          saveState();
          renderTabs();
          renderActive();
        } else {
          renderActive();
        }
      }
    }
